# OmegaSL TextMate grammar.
#
# The keyword, type, builtin, and attribute vocabularies below are kept in sync
# with the compiler's own tables — the hard keywords + type spellings in
# gte/omegasl/src/Toks.def, the builtin-function and semantic-attribute names in
# gte/omegasl/src/AST.def. When a language feature adds a keyword/type/intrinsic
# there, mirror it here. Every list is matched inside `\b...\b`, so alternation
# order does not affect correctness (a trailing `\b` forbids partial-word hits,
# e.g. `atan` cannot swallow `atan2`); longer-first ordering is kept only for
# readability.
name: OmegaSL
scopeName: source.omegasl
fileTypes:
  - omegasl
  - omegaslh
foldingStartMarker: '\{\s*$'
foldingStopMarker: '^\s*\}'
uuid: 0c7af5c0-ded7-44af-8b49-15e3e0203d8f
variables:
  ident: '[A-Za-z_][A-Za-z0-9_]*'
  # --- builtin functions (grouped for readability; see AST.def) ---
  builtin_math: 'sin|cos|tan|asin|acos|atan2|atan|sinh|cosh|tanh|sqrt|rsqrt|abs|sign|floor|ceil|round|trunc|frac|saturate|normalize|length|distance|exp2|exp|log2|log|pow|min|max|step|smoothstep|clamp|lerp|reflect|refract|faceforward|fmod|mod|mad|fma|ldexp|modf|frexp|degrees|radians|transpose|determinant|inverse'
  builtin_relational: 'any|all|lessThanEqual|lessThan|greaterThanEqual|greaterThan|equal|notEqual'
  builtin_bits: 'countbits|reversebits|firstbithigh|firstbitlow|bitfieldExtract|bitfieldInsert|asint|asuint|asfloat'
  builtin_pack: 'f16tof32|f32tof16|packHalf2x16|unpackHalf2x16|packSnorm4x8|unpackSnorm4x8|packUnorm4x8|unpackUnorm4x8|packSnorm2x16|unpackSnorm2x16|packUnorm2x16|unpackUnorm2x16'
  builtin_deriv: 'ddx_coarse|ddx_fine|ddy_coarse|ddy_fine|fwidth_coarse|fwidth_fine|ddx|ddy|fwidth'
  builtin_atomic: 'atomic_compare_exchange_weak|atomic_compare_exchange|atomic_exchange|atomic_add|atomic_min|atomic_max|atomic_and|atomic_or|atomic_xor|atomic_load|atomic_store'
  builtin_texture: 'sampleLOD|sampleBias|sampleGrad|sample|gatherRed|gatherGreen|gatherBlue|gatherAlpha|gather|calculateLOD|getDimensions|read|write'
  builtin_compute: 'threadgroupBarrier|deviceBarrier|setMeshOutputs'
  builtin_core: 'dot|cross'
  builtin_ctor: 'make_(?:float(?:2x2|2x3|2x4|3x2|3x3|3x4|4x2|4x3|4x4|2|3|4)|(?:bool|int|uint|half|short|ushort|long|ulong|double)(?:2|3|4))'
  # --- keywords (Toks.def; in/out/inout are contextual — resource maps only) ---
  stage_keywords: 'vertex|fragment|compute|hull|domain|mesh'
  control_keywords: 'if|else|for|while|break|continue|switch|case|default|return|discard'
  declaration_keywords: 'struct|internal|static|const|threadgroup'
  interp_modifiers: 'flat|centroid|noperspective'
  resource_access_keywords: 'inout|in|out'
  # --- types (Toks.def KW_TY_*) ---
  scalar_types: 'void|bool|uint|int|float|double|half|ushort|short|ulong|long'
  vector_types: '(?:bool|uint|int|float|double|half|ushort|short|ulong|long)(?:2|3|4)'
  matrix_types: '(?:float|uint|int)(?:2x2|2x3|2x4|3x2|3x3|3x4|4x2|4x3|4x4)'
  resource_types: 'buffer|uniform|constant|texture1d_array|texture2d_array|texture1d|texture2d|texture3d|texturecube_array|texturecube|texture2d_ms_array|texture2d_ms|sampler1d|sampler2d|sampler3d|samplercube|atomic_int|atomic_uint'
  # --- annotations / decorators (AST.def ATTRIBUTE_*, Parser descriptor words) ---
  attribute_names: 'VertexID|InstanceID|Position|Color|TexCoord|GlobalThreadID|LocalThreadID|ThreadGroupID|Depth|FrontFacing|SampleIndex|InputCoverage|OutputCoverage|ClipDistance|CullDistance'
  decorator_properties: 'domain|partitioning|outputtopology|outputcontrolpoints|filter|address_mode|max_anisotropy|max_vertices|max_primitives|topology|x|y|z'
  decorator_values: 'linear|point|anisotropic|wrap|clamp_to_edge|mirror_wrap|mirror|tri|quad|integer|fractional_even|fractional_odd|triangle_cw|triangle_ccw|triangle|line|early_depth'
patterns:
  - include: "#comments"
  - include: "#preprocessor"
  - include: "#strings"
  - include: "#numbers"
  - include: "#shader-declarations"
  - include: "#struct-declarations"
  - include: "#resource-declarations"
  - include: "#resource-map"
  - include: "#attributes"
  - include: "#keywords"
  - include: "#types"
  - include: "#builtins"
  - include: "#constants"
  - include: "#member-access"
  - include: "#function-calls"
  - include: "#operators"
  - include: "#punctuation"
repository:
  comments:
    patterns:
      - name: comment.line.double-slash.omegasl
        match: '//.*$'
      - name: comment.block.omegasl
        begin: '/\*'
        end: '\*/'
  preprocessor:
    patterns:
      - name: meta.preprocessor.omegasl
        begin: '^\s*(#)\s*(define|ifdef|ifndef|if|elif|else|endif|include|requires)\b'
        beginCaptures:
          "1":
            name: punctuation.definition.preprocessor.omegasl
          "2":
            name: keyword.control.import.omegasl
        end: '$'
        patterns:
          - include: "#strings"
          - name: entity.name.function.preprocessor.omegasl
            match: '\b{{ident}}\b'
  strings:
    patterns:
      - name: string.quoted.double.omegasl
        begin: '"'
        end: '"'
        patterns:
          - name: constant.character.escape.omegasl
            match: '\\.'
  numbers:
    patterns:
      - name: constant.numeric.float.omegasl
        match: '\b(?:\d+\.\d*|\.\d+)(?:[eE][+\-]?\d+)?[fh]?\b'
      - name: constant.numeric.float.omegasl
        match: '\b\d+[eE][+\-]?\d+[fh]?\b'
      - name: constant.numeric.integer.omegasl
        match: '\b\d+[uUlL]*\b'
  shader-declarations:
    patterns:
      - name: meta.function.shader.omegasl
        match: '\b({{stage_keywords}})\b(?:\s*\([^)]*\))?\s+((?:{{scalar_types}}|{{vector_types}}|{{matrix_types}}|{{ident}}))\s+({{ident}})\s*(?=\()'
        captures:
          "1":
            name: storage.type.function.shader.omegasl
          "2":
            name: storage.type.return-type.omegasl
          "3":
            name: entity.name.function.shader.omegasl
  struct-declarations:
    patterns:
      - name: meta.struct.omegasl
        match: '\b(struct)\s+({{ident}})(?:\s+(internal))?\b'
        captures:
          "1":
            name: storage.type.struct.omegasl
          "2":
            name: entity.name.type.struct.omegasl
          "3":
            name: storage.modifier.omegasl
  resource-declarations:
    patterns:
      - name: meta.resource.buffer.omegasl
        match: '\b(buffer|uniform|constant)\s*(<)\s*({{ident}})\s*(>)\s+({{ident}})\s*(:)\s*(\d+)\b'
        captures:
          "1":
            name: storage.type.resource.omegasl
          "2":
            name: punctuation.definition.generic.begin.omegasl
          "3":
            name: entity.name.type.omegasl
          "4":
            name: punctuation.definition.generic.end.omegasl
          "5":
            name: variable.other.resource.omegasl
          "6":
            name: punctuation.separator.annotation.omegasl
          "7":
            name: constant.numeric.integer.decimal.omegasl
      - name: meta.resource.texture-sampler.omegasl
        match: '\b(texture1d_array|texture2d_array|texture1d|texture2d|texture3d|texturecube_array|texturecube|texture2d_ms_array|texture2d_ms|sampler1d|sampler2d|sampler3d|samplercube)\b\s+({{ident}})\s*(?::\s*(\d+))?'
        captures:
          "1":
            name: storage.type.resource.omegasl
          "2":
            name: variable.other.resource.omegasl
          "3":
            name: constant.numeric.integer.decimal.omegasl
  resource-map:
    patterns:
      - name: meta.resource-map.omegasl
        begin: '\['
        end: '\]'
        beginCaptures:
          "0":
            name: punctuation.section.brackets.begin.omegasl
        endCaptures:
          "0":
            name: punctuation.section.brackets.end.omegasl
        patterns:
          - name: keyword.control.resource-access.omegasl
            match: '\b(?:{{resource_access_keywords}})\b'
          - name: variable.other.resource.omegasl
            match: '\b{{ident}}\b'
          - name: punctuation.separator.comma.omegasl
            match: ','
  attributes:
    patterns:
      - name: meta.attribute.annotation.omegasl
        match: '(:)\s*({{attribute_names}})\b'
        captures:
          "1":
            name: punctuation.separator.annotation.omegasl
          "2":
            name: support.constant.attribute.omegasl
      - name: meta.shader.decorator.property.omegasl
        match: '\b({{decorator_properties}})\b(?=\s*=)'
        captures:
          "1":
            name: variable.parameter.decorator.omegasl
      - name: support.constant.decorator.omegasl
        match: '\b(?:{{decorator_values}})\b'
  keywords:
    patterns:
      - name: keyword.control.omegasl
        match: '\b(?:{{control_keywords}})\b'
      - name: storage.modifier.omegasl
        match: '\b(?:{{declaration_keywords}}|{{interp_modifiers}})\b'
      - name: storage.type.function.shader.omegasl
        match: '\b(?:{{stage_keywords}})\b'
  types:
    patterns:
      - name: storage.type.primitive.omegasl
        match: '\b(?:{{matrix_types}}|{{vector_types}}|{{scalar_types}})\b'
      - name: storage.type.resource.omegasl
        match: '\b(?:{{resource_types}})\b'
  builtins:
    patterns:
      - name: support.function.constructor.omegasl
        match: '\b{{builtin_ctor}}\b'
      - name: support.function.builtin.omegasl
        match: '\b(?:{{builtin_core}}|{{builtin_math}}|{{builtin_relational}}|{{builtin_bits}}|{{builtin_pack}}|{{builtin_deriv}}|{{builtin_atomic}}|{{builtin_texture}}|{{builtin_compute}})\b'
  constants:
    patterns:
      - name: constant.language.boolean.omegasl
        match: '\b(?:true|false)\b'
  member-access:
    patterns:
      - name: variable.other.member.omegasl
        match: '(?<=\.){{ident}}\b'
  function-calls:
    patterns:
      - name: entity.name.function.omegasl
        match: '\b({{ident}})\s*(?=\()'
        captures:
          "1":
            name: entity.name.function.omegasl
  operators:
    patterns:
      - name: keyword.operator.omegasl
        match: '(?:\+\+|--|\+=|-=|\*=|/=|%=|&=|\|=|\^=|<<=|>>=|==|!=|<=|>=|&&|\|\||<<|>>|\?|[-+*/%=!<>&|\^~])'
  punctuation:
    patterns:
      - name: punctuation.accessor.omegasl
        match: '\.'
      - name: punctuation.separator.comma.omegasl
        match: ','
      - name: punctuation.terminator.statement.omegasl
        match: ';'
      - name: punctuation.section.group.begin.omegasl
        match: '[({]'
      - name: punctuation.section.group.end.omegasl
        match: '[)}]'
